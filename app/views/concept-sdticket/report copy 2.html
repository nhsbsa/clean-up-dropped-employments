{% extends "layout.html" %}

{% block pageTitle %}Report amendments{% endblock %}

{% block content %}

<div class="nhsuk-grid-row">
  <div class="nhsuk-grid-column-full">

    <h1 class="nhsuk-heading-l">Report amendments</h1>

    <form id="reportForm">

      <table class="nhsuk-table" id="reportTable">
        <thead>
          <tr>
            <th scope="col">Sets</th>
            <th scope="col">Fields</th>
            <th scope="col">Amendments to be made</th>
            <th scope="col">Remove</th>
          </tr>
        </thead>
        <tbody>

          <!-- 8 pre-populated rows -->
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 1" aria-label="Sets row 1"></td>
            <td><input class="nhsuk-input" type="text" value="Field A" aria-label="Fields row 1"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment A1" aria-label="Amendments row 1"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 2" aria-label="Sets row 2"></td>
            <td><input class="nhsuk-input" type="text" value="Field B" aria-label="Fields row 2"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment B1" aria-label="Amendments row 2"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 3" aria-label="Sets row 3"></td>
            <td><input class="nhsuk-input" type="text" value="Field C" aria-label="Fields row 3"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment C1" aria-label="Amendments row 3"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 4" aria-label="Sets row 4"></td>
            <td><input class="nhsuk-input" type="text" value="Field D" aria-label="Fields row 4"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment D1" aria-label="Amendments row 4"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 5" aria-label="Sets row 5"></td>
            <td><input class="nhsuk-input" type="text" value="Field E" aria-label="Fields row 5"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment E1" aria-label="Amendments row 5"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 6" aria-label="Sets row 6"></td>
            <td><input class="nhsuk-input" type="text" value="Field F" aria-label="Fields row 6"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment F1" aria-label="Amendments row 6"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 7" aria-label="Sets row 7"></td>
            <td><input class="nhsuk-input" type="text" value="Field G" aria-label="Fields row 7"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment G1" aria-label="Amendments row 7"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>
          <tr class="nhsuk-table__row">
            <td><input class="nhsuk-input" type="text" value="Set 8" aria-label="Sets row 8"></td>
            <td><input class="nhsuk-input" type="text" value="Field H" aria-label="Fields row 8"></td>
            <td><input class="nhsuk-input" type="text" value="Amendment H1" aria-label="Amendments row 8"></td>
            <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
          </tr>

        </tbody>
      </table>

      <button type="button" id="addRowButton" class="nhsuk-button nhsuk-button--secondary">Add another row</button>
      <hr class="nhsuk-section-break nhsuk-section-break--l nhsuk-section-break--visible">
      <button type="submit" class="nhsuk-button">Continue</button>

    </form>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {

    const tableBody = document.querySelector('#reportTable tbody');
    const addButton = document.getElementById('addRowButton');

    // Remove row
    function bindRemoveLinks() {
      tableBody.querySelectorAll('.remove-row').forEach(link => {
        link.removeEventListener('click', removeHandler);
        link.addEventListener('click', removeHandler);
      });
    }

    function removeHandler(e) {
      e.preventDefault();
      const row = e.target.closest('tr');
      row.remove();
    }

    bindRemoveLinks();

    // Add new row
    addButton.addEventListener('click', function() {
      const rowCount = tableBody.rows.length;
      const newRow = document.createElement('tr');
      newRow.classList.add('nhsuk-table__row');

      newRow.innerHTML = `
        <td><input class="nhsuk-input" type="text" name="sets[]" aria-label="Sets row ${rowCount+1}"></td>
        <td><input class="nhsuk-input" type="text" name="fields[]" aria-label="Fields row ${rowCount+1}"></td>
        <td><input class="nhsuk-input" type="text" name="amendments[]" aria-label="Amendments row ${rowCount+1}"></td>
        <td><a href="#" class="remove-row nhsuk-link">Remove</a></td>
      `;

      tableBody.appendChild(newRow);
      bindRemoveLinks();
    });

  });
</script>

{% endblock %}
